apiVersion: v1
kind: Service
metadata:
  name: eren-api
  namespace: eren
  labels:
    app: eren-api
spec:
  type: ClusterIP
  selector:
    app: eren-api
  ports:
    - port: 80
      targetPort: 8000
      name: http
    - port: 9090
      targetPort: 9090
      name: metrics
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eren-api
  namespace: eren
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.eren.dev"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.eren.dev
      secretName: eren-api-tls
  rules:
    - host: api.eren.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: eren-api
                port:
                  number: 80
