[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning

# Per-test override: asyncio_mode=auto on unit test functions causes
# pytest-asyncio to auto-await sync dependency override return values.
# The unit tests use sync def dependency overrides to avoid this.
markers =
    unit: Unit tests using sync dependency overrides
    integration: Integration tests requiring real database
