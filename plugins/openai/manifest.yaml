# OpenAI Plugin Manifest for EREN OS

plugin_id: openai-reasoning
version: 1.0.0
name: OpenAI Reasoning Plugin
description: OpenAI GPT reasoning capability for EREN
author: EREN Team

category: llm
priority: 150

contracts:
  implements:
    - ReasoningContract
  requires: []

dependencies: []

capabilities:
  - reasoning
  - chat
  - completion
  - streaming

configuration:
  provider: openai
  model: gpt-5-mini
  temperature: 0.2
  max_tokens: 4000
  timeout: 60
  retries: 3
  stream: false

supported_models:
  - gpt-5
  - gpt-5-mini
  - gpt-5-nano
  - gpt-4
  - gpt-4-turbo
  - gpt-4o
  - gpt-4o-mini

metadata:
  documentation: docs/plugins/openai.md
  repository: https://github.com/Tiago1203/EREN/plugins/openai
