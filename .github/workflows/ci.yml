name: CI

on:
  push:
    branches: [main, epic1-*, feature/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install linters
        run: uv pip install ruff black isort pre-commit

      - name: Run ruff check
        run: ruff check apps/api/ --ignore E501 || true

      - name: Run ruff format check
        run: ruff format --check apps/api/ || true

  typecheck:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd apps/api
          uv sync --no-install-project --group dev

      - name: Run mypy on domain
        run: |
          cd apps/api
          uv run mypy app/domain/ --ignore-missing-imports || true

      - name: Run mypy on infrastructure
        run: |
          cd apps/api
          uv run mypy app/infrastructure/ --ignore-missing-imports || true

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eren
          POSTGRES_PASSWORD: eren
          POSTGRES_DB: eren_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd apps/api
          uv sync --group dev

      - name: Create PostgreSQL schemas
        run: |
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS incident AUTHORIZATION eren;" || true
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS device AUTHORIZATION eren;" || true
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS recommendation AUTHORIZATION eren;" || true
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS knowledge AUTHORIZATION eren;" || true
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS work_order AUTHORIZATION eren;" || true

      - name: Run unit tests
        run: |
          cd apps/api
          uv run pytest tests/unit -v --tb=short
        env:
          EREN_API_DATABASE_URL: postgresql+asyncpg://eren:eren@localhost:5432/eren_test

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        run: |
          docker build -f apps/api/Dockerfile -t eren-api:test .

  architecture:
    name: Architecture Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd apps/api
          uv sync --group dev

      - name: Verify infrastructure imports
        run: |
          cd apps/api
          echo 'from app.infrastructure import CacheService, configure_logging, setup_tracing, DeviceModel; print("Infrastructure imports OK")' > /tmp/check_infra.py
          PYTHONPATH="$GITHUB_WORKSPACE" uv run python /tmp/check_infra.py

      - name: Verify domain repository interfaces
        run: |
          cd apps/api
          echo 'from app.domain.device.repository import DeviceRepository; from app.domain.work_order.repository import WorkOrderRepository; from core.device.domain.repositories import DeviceRepository as CoreDeviceRepo; from core.incident.domain.repositories import IncidentRepository; from core.recommendation.domain.repositories import RecommendationRepository; from core.knowledge.domain.repositories import KnowledgeRepository; print("Domain repository interfaces OK")' > /tmp/check_repos.py
          PYTHONPATH="$GITHUB_WORKSPACE" uv run python /tmp/check_repos.py

      - name: Verify domain entities can be imported
        run: |
          cd apps/api
          echo 'from core.device.domain.entities import Device; from core.incident.domain.entities import EngineeringIncident; from core.recommendation.domain.entities import AIRecommendation; from core.knowledge.domain.entities import KnowledgeArticle; from app.domain.work_order.service import WorkOrderService; print("Domain entities OK")' > /tmp/check_entities.py
          PYTHONPATH="$GITHUB_WORKSPACE" uv run python /tmp/check_entities.py
