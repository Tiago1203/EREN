name: CI

on:
  push:
    branches: [main, epic1-*, feature/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort pre-commit

      - name: Run ruff check
        run: ruff check core/ apps/api/ --ignore E501 || true

      - name: Run ruff format check
        run: ruff format --check core/ apps/api/ || true

      - name: Check for trailing whitespace
        run: pre-commit run trailing-whitespace --all-files || true

  typecheck:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install mypy types-python-dateutil types-redis

      - name: Run mypy on core
        run: mypy core/ --ignore-missing-imports || true

      - name: Run mypy on api infrastructure
        run: mypy apps/api/app/infrastructure/ --ignore-missing-imports || true

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eren
          POSTGRES_PASSWORD: eren
          POSTGRES_DB: eren_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx asyncpg

      - name: Create PostgreSQL user and database
        run: |
          PGPASSWORD=eren psql -h localhost -U postgres -c "CREATE USER eren WITH PASSWORD 'eren' CREATEDB;" || true
          PGPASSWORD=eren psql -h localhost -U postgres -c "CREATE DATABASE eren_test OWNER eren;" || true
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS incident AUTHORIZATION eren;" || true
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS device AUTHORIZATION eren;" || true
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS recommendation AUTHORIZATION eren;" || true
          PGPASSWORD=eren psql -h localhost -U eren -d eren_test -c "CREATE SCHEMA IF NOT EXISTS knowledge AUTHORIZATION eren;" || true

      - name: Run unit tests
        run: |
          cd apps/api
          python -m pytest tests/unit -v --tb=short
        env:
          EREN_API_DATABASE_URL: postgresql+asyncpg://eren:eren@localhost:5432/eren_test

      - name: Run integration tests
        run: |
          cd apps/api
          python -m pytest tests/integration -v --tb=short
        env:
          EREN_API_DATABASE_URL: postgresql+asyncpg://eren:eren@localhost:5432/eren_test

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        run: |
          docker build -f apps/api/Dockerfile -t eren-api:test .

      - name: Build Worker Docker image
        run: |
          docker build -f apps/worker/Dockerfile -t eren-worker:test .

  architecture:
    name: Architecture Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Verify infrastructure imports
        run: python -c "from app.infrastructure import (CacheService,configure_logging,setup_tracing); print('Infrastructure imports OK')"

      - name: Verify domain repository interfaces
        run: python -c "from core.incident.domain.repositories import IncidentRepository; from core.device.domain.repositories import DeviceRepository; from core.recommendation.domain.repositories import RecommendationRepository; from core.knowledge.domain.repositories import KnowledgeRepository; print('Domain interfaces OK')"

      - name: Verify core domain can be imported
        run: python -c "from core.contracts.security.authentication import AuthenticationResult; from core.incident.domain.entities import EngineeringIncident; from core.device.domain.entities import Device; from core.recommendation.domain.entities import AIRecommendation; from core.knowledge.domain.entities import KnowledgeArticle; print('Core domain imports OK')"
