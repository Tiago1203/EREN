name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort
          
      - name: Run ruff on core
        run: ruff check core/ || true
        
      - name: Run ruff on api
        run: ruff check apps/api/app/ apps/api/tests/ || true
        
      - name: Run ruff format check
        run: ruff format --check core/ apps/api/ || true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
        
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eren
          POSTGRES_PASSWORD: eren_test
          POSTGRES_DB: eren_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api"
          pip install pytest pytest-asyncio pytest-cov httpx asyncpg
          
      - name: Run unit tests
        run: |
          PYTHONPATH=apps/api python -m pytest apps/api/tests/unit -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://eren:eren_test@localhost:5432/eren_test
        
      - name: Run core tests
        run: PYTHONPATH=. python -m pytest tests/ -v --tb=short || true

  architecture:
    name: Architecture Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api"
          
      - name: Verify domain imports
        run: python -c "from app.domain.patient import PatientService, SQLAlchemyPatientRepository; from app.infrastructure import EventBus; print('Domain imports OK')"
          
      - name: Verify middleware imports
        run: python -c "from app.middleware import AuditMiddleware, AuthenticationMiddleware; print('Middleware imports OK')"
          
      - name: Verify contracts
        run: python -c "from core.contracts.security.authentication import AuthenticationProvider; from core.contracts.security.audit import AuditProvider; print('Contracts OK')"
          
      - name: Verify models
        run: python -c "from app.models import Patient; from app.models.patient import Patient; print('Models OK')"
